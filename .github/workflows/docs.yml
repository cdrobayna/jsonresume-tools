name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'packages/*/README.md'
      - 'packages/tailor/tailor-variant.schema.json'
      - '.github/workflows/docs.yml'
  pull_request:
    branches: [main]
    paths:
      - 'docs/**'
      - 'packages/*/README.md'
      - 'packages/tailor/tailor-variant.schema.json'
      - '.github/workflows/docs.yml'

# Cancel superseded runs on the same ref (PR updates, or overlapping main pushes racing to deploy).
concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # docs:build regenerates docs/reference/*.md from the package READMEs (docs:prepare) and
      # runs VitePress with dead-link checking on — a broken internal link fails this build,
      # independent of the package build/test pipeline in ci.yml.
      - name: Build docs
        run: pnpm docs:build

      - name: Upload docs artifact
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  # Deploys to GitHub Pages on push to main only. Requires the one-time repo setting:
  # Settings -> Pages -> Source -> "GitHub Actions".
  deploy:
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
